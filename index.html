<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f8dce7" />
  <title>For Pinki ❤️</title>
  <style>
    :root {
      --ink: #33242b;
      --muted: rgba(51, 36, 43, .66);
      --pink-50: #fff7fa;
      --pink-100: #ffeaf2;
      --pink-200: #f8cedd;
      --rose: #d989a4;
      --rose-deep: #9e516b;
      --night-1: #0e101c;
      --night-2: #1a1424;
      --ease-spring: cubic-bezier(.18, .9, .24, 1.12);
      --ease-soft: cubic-bezier(.22, 1, .36, 1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Inter, Roboto, Arial, sans-serif;
      color: var(--ink);
      background: var(--night-1);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100svh;
      min-height: 560px;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 218, 234, 0), transparent 26%),
        linear-gradient(180deg, var(--night-1) 0%, var(--night-2) 52%, #2b1726 100%);
      transition: background 1800ms var(--ease-soft);
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      inset: -20%;
      z-index: -2;
      pointer-events: none;
      transition: opacity 1800ms var(--ease-soft), transform 1800ms var(--ease-soft);
    }

    .app::before {
      opacity: .6;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 18%),
        radial-gradient(circle at 78% 18%, rgba(255,195,218,.08), transparent 20%);
      filter: blur(4px);
    }

    .app::after {
      opacity: 0;
      background:
        radial-gradient(circle at 50% 7%, rgba(255,255,255,.88), transparent 14%),
        radial-gradient(circle at 18% 22%, rgba(255, 208, 226, .92), transparent 28%),
        radial-gradient(circle at 86% 28%, rgba(255, 236, 214, .9), transparent 24%),
        linear-gradient(180deg, #fff5f8 0%, #ffdce9 45%, #f6bdcf 100%);
      filter: saturate(1.05);
      z-index: -3;
    }

    .app.opened {
      background:
        radial-gradient(circle at 50% 9%, rgba(255,255,255,.9), transparent 16%),
        linear-gradient(180deg, #fff6f9 0%, #ffe1eb 43%, #f5bed1 100%);
    }

    .app.opened::before { opacity: .18; transform: scale(1.04); }
    .app.opened::after { opacity: 1; }

    .ambient {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .orb {
      position: absolute;
      width: 42vmax;
      aspect-ratio: 1;
      border-radius: 999px;
      filter: blur(42px);
      opacity: .32;
      transform: translate3d(0,0,0);
      animation: drift 14s ease-in-out infinite alternate;
    }

    .orb.one { left: -20vmax; top: 8%; background: #ffb8cf; animation-delay: -4s; }
    .orb.two { right: -21vmax; bottom: -8%; background: #ffe2bb; animation-delay: -8s; }

    @keyframes drift {
      to { transform: translate3d(5%, -4%, 0) scale(1.08); }
    }

    .scene {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
      justify-items: center;
      width: 100%;
      height: 100%;
      padding: max(28px, calc(var(--safe-top) + 22px)) 20px max(22px, calc(var(--safe-bottom) + 18px));
    }

    .intro {
      width: min(92vw, 480px);
      text-align: center;
      color: rgba(255,255,255,.92);
      transition: color 1500ms var(--ease-soft), transform 1000ms var(--ease-soft), opacity 1000ms var(--ease-soft);
      will-change: transform, opacity;
    }

    .app.opened .intro { color: var(--ink); transform: translateY(-8px); }
    .app.letter-ready .intro { opacity: 0; transform: translateY(-22px) scale(.98); pointer-events: none; }

    .eyebrow {
      margin: 0 0 9px;
      font-size: clamp(2rem, 8vw, 3.55rem);
      line-height: 1.03;
      letter-spacing: -.055em;
      font-weight: 730;
    }

    .subtitle {
      margin: 0;
      font-size: clamp(.98rem, 3.6vw, 1.12rem);
      letter-spacing: -.01em;
      color: currentColor;
      opacity: .68;
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      width: min(92vw, 430px);
      height: min(62svh, 510px);
      min-height: 390px;
      perspective: 1400px;
    }

    .envelope-wrap {
      position: relative;
      width: min(86vw, 360px);
      height: 250px;
      transform: translateY(16px);
      filter: drop-shadow(0 26px 35px rgba(50, 20, 34, .28));
      transition: transform 900ms var(--ease-spring), filter 1200ms var(--ease-soft), opacity 700ms ease;
      will-change: transform, filter, opacity;
      z-index: 5;
    }

    .envelope-button {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      padding: 0;
      transform-style: preserve-3d;
    }

    .envelope-button:focus-visible {
      outline: 3px solid rgba(255,255,255,.8);
      outline-offset: 12px;
      border-radius: 26px;
    }

    .envelope {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 218px;
      transform-style: preserve-3d;
    }

    .pocket-back {
      position: absolute;
      inset: 25px 0 0;
      border-radius: 18px 18px 24px 24px;
      background: linear-gradient(145deg, #fff1f6 0%, #f7bdd0 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
      overflow: hidden;
    }

    .letter {
      position: absolute;
      left: 50%;
      bottom: 62px;
      width: min(78vw, 316px);
      height: min(58svh, 438px);
      max-height: 438px;
      min-height: 392px;
      transform: translate3d(-50%, 134px, 0) scale(.88);
      opacity: 0;
      z-index: 1;
      border-radius: 24px;
      padding: clamp(22px, 5.3vw, 30px) clamp(21px, 5vw, 30px);
      background:
        linear-gradient(90deg, rgba(255,255,255,.28) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,248,244,.95)),
        #fff8f1;
      box-shadow: 0 26px 54px rgba(111, 54, 75, .24), inset 0 0 0 1px rgba(151, 89, 104, .08);
      color: #3d2830;
      overflow: hidden;
      will-change: transform, opacity;
    }

    .letter::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.7), transparent 18%),
        repeating-linear-gradient(0deg, rgba(126,74,82,.035) 0 1px, transparent 1px 8px);
      mix-blend-mode: multiply;
      opacity: .75;
    }

    .letter-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
    }

    .letter h2 {
      margin: 0 0 15px;
      font-family: "Brush Script MT", "Segoe Script", "Apple Chancery", cursive;
      font-size: clamp(2.04rem, 9vw, 3.05rem);
      line-height: .9;
      font-weight: 500;
      letter-spacing: -.035em;
      color: #8f4863;
    }

    .letter p {
      margin: 0;
      white-space: pre-line;
      font-size: clamp(.92rem, 3.55vw, 1.04rem);
      line-height: 1.43;
      letter-spacing: -.012em;
      color: rgba(51, 36, 43, .83);
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 118px;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      transform: translateX(-50%);
      z-index: 8;
      background: linear-gradient(145deg, #d990a9, #b96482);
      box-shadow: 0 10px 18px rgba(120, 47, 74, .25), inset 0 1px 0 rgba(255,255,255,.35);
      color: rgba(255,255,255,.94);
      font-size: 22px;
      transition: transform 700ms var(--ease-spring), opacity 500ms ease;
    }

    .front-left,
    .front-right,
    .front-bottom {
      position: absolute;
      inset: 25px 0 0;
      border-radius: 18px 18px 24px 24px;
      overflow: hidden;
      z-index: 6;
    }

    .front-left { clip-path: polygon(0 0, 50% 55%, 0 100%); background: linear-gradient(145deg, #ffd9e5, #eaa9bf); }
    .front-right { clip-path: polygon(100% 0, 50% 55%, 100% 100%); background: linear-gradient(215deg, #ffe8ef, #e59ab5); }
    .front-bottom { clip-path: polygon(0 100%, 50% 43%, 100% 100%); background: linear-gradient(180deg, #ffd1df, #f3a8c0); z-index: 7; }

    .flap {
      position: absolute;
      left: 0;
      right: 0;
      top: 25px;
      height: 126px;
      z-index: 9;
      transform-origin: 50% 0%;
      transform: rotateX(0deg);
      transform-style: preserve-3d;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      background: linear-gradient(180deg, #fff3f7 0%, #efaec3 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.85);
      transition: transform 1050ms var(--ease-spring), z-index 1ms linear 700ms, opacity 650ms ease;
      will-change: transform, opacity;
    }

    .flap::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #f2a9bf, #ffdbe7);
      transform: rotateY(180deg);
      backface-visibility: hidden;
    }

    .hint {
      position: absolute;
      top: calc(100% + 18px);
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.76);
      font-size: .86rem;
      letter-spacing: -.01em;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.14);
      white-space: nowrap;
      transition: opacity 450ms ease, transform 450ms ease;
    }

    .app.opened .envelope-wrap { transform: translateY(104px) scale(.84); filter: drop-shadow(0 18px 28px rgba(98, 41, 60, .18)); }
    .app.opened .flap { z-index: 2; transform: rotateX(178deg); }
    .app.opened .seal { opacity: 0; transform: translateX(-50%) translateY(22px) scale(.55); }
    .app.opened .hint { opacity: 0; transform: translateX(-50%) translateY(10px); }
    .app.opened .letter { animation: letterReveal 1750ms var(--ease-spring) 430ms forwards; }
    .app.letter-ready .envelope-wrap { transform: translateY(137px) scale(.72); }
    .app.letter-ready .letter { z-index: 12; }
    .app.letter-ready .pocket-back,
    .app.letter-ready .front-left,
    .app.letter-ready .front-right,
    .app.letter-ready .front-bottom,
    .app.letter-ready .flap {
      opacity: 0;
      transform: translateY(24px) scale(.98);
      transition: opacity 720ms ease, transform 720ms var(--ease-soft);
    }

    @keyframes letterReveal {
      0% { opacity: 0; transform: translate3d(-50%, 134px, 0) scale(.88); }
      22% { opacity: 1; }
      58% { transform: translate3d(-50%, -128px, 0) scale(.94); }
      100% { opacity: 1; transform: translate3d(-50%, -166px, 0) scale(1); }
    }

    .last-thing {
      align-self: end;
      margin-bottom: 4px;
      opacity: 0;
      transform: translateY(18px) scale(.96);
      pointer-events: none;
      padding: 15px 22px;
      border-radius: 999px;
      color: #73384f;
      background: rgba(255,255,255,.58);
      border: 1px solid rgba(255,255,255,.62);
      box-shadow: 0 18px 40px rgba(139, 70, 96, .16), inset 0 1px 0 rgba(255,255,255,.8);
      backdrop-filter: blur(20px) saturate(1.3);
      font-weight: 650;
      letter-spacing: -.018em;
      transition: opacity 720ms var(--ease-soft), transform 720ms var(--ease-spring), box-shadow 300ms ease;
      z-index: 8;
    }

    .app.letter-ready .last-thing { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .last-thing:active { transform: translateY(1px) scale(.98); }

    .sparkle {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,.96);
      box-shadow: 0 0 16px rgba(255,255,255,.95), 0 0 28px rgba(216,116,154,.35);
      opacity: 0;
      animation: sparkleFloat var(--dur, 5s) ease-in-out var(--delay, 0s) infinite;
      will-change: transform, opacity;
    }

    @keyframes sparkleFloat {
      0%, 100% { opacity: 0; transform: translate3d(0, 18px, 0) scale(.55); }
      22%, 72% { opacity: .95; }
      55% { transform: translate3d(var(--x, 8px), -42px, 0) scale(1); }
    }

    .final {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: max(28px, var(--safe-top)) 23px max(28px, var(--safe-bottom));
      text-align: center;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.9), transparent 18%),
        radial-gradient(circle at 12% 15%, rgba(255, 222, 235, .95), transparent 26%),
        radial-gradient(circle at 87% 82%, rgba(255, 232, 203, .85), transparent 24%),
        linear-gradient(180deg, #fff8fa 0%, #ffdce8 100%);
      opacity: 0;
      pointer-events: none;
      transform: scale(1.015);
      transition: opacity 950ms var(--ease-soft), transform 950ms var(--ease-soft);
    }

    .final.show { opacity: 1; pointer-events: auto; transform: scale(1); }

    .final-card {
      width: min(91vw, 520px);
      padding: clamp(32px, 8vw, 54px) clamp(24px, 7vw, 48px);
      border-radius: 34px;
      background: rgba(255,255,255,.54);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: 0 30px 80px rgba(143, 72, 99, .2), inset 0 1px 0 rgba(255,255,255,.88);
      backdrop-filter: blur(24px) saturate(1.35);
    }

    .final h1 {
      margin: 0 0 22px;
      font-size: clamp(2.35rem, 12vw, 5.3rem);
      line-height: .95;
      letter-spacing: -.07em;
      color: #8b3f5b;
      font-weight: 780;
    }

    .final p {
      margin: 0;
      white-space: pre-line;
      font-size: clamp(1.02rem, 4.2vw, 1.28rem);
      line-height: 1.7;
      letter-spacing: -.018em;
      color: rgba(51,36,43,.76);
    }

    @media (max-height: 680px) {
      .app { min-height: 520px; }
      .scene { padding-top: 18px; padding-bottom: 14px; }
      .eyebrow { font-size: clamp(1.8rem, 7vw, 2.7rem); }
      .stage { height: 410px; min-height: 360px; }
      .letter { height: 374px; min-height: 374px; padding: 20px 22px; }
      .letter h2 { margin-bottom: 10px; }
      .letter p { font-size: .88rem; line-height: 1.34; }
      @keyframes letterReveal {
        0% { opacity: 0; transform: translate3d(-50%, 134px, 0) scale(.88); }
        22% { opacity: 1; }
        58% { transform: translate3d(-50%, -112px, 0) scale(.94); }
        100% { opacity: 1; transform: translate3d(-50%, -142px, 0) scale(.97); }
      }
      .app.opened .envelope-wrap { transform: translateY(104px) scale(.76); }
      .app.letter-ready .envelope-wrap { transform: translateY(126px) scale(.66); }
      .last-thing { padding: 13px 19px; }
    }

    @media (min-width: 720px) {
      .scene { padding-left: 32px; padding-right: 32px; }
      .stage { height: min(65svh, 560px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app" aria-live="polite">
    <div class="ambient" aria-hidden="true">
      <span class="orb one"></span>
      <span class="orb two"></span>
    </div>

    <section class="scene" aria-label="A morning letter for Pinki">
      <header class="intro">
        <h1 class="eyebrow">Good Morning, Baby 🌙</h1>
        <p class="subtitle">Someone left you a letter...</p>
      </header>

      <div class="stage">
        <div class="envelope-wrap" id="envelopeWrap">
          <button class="envelope-button" id="openEnvelope" type="button" aria-label="Open the letter">
            <div class="envelope" aria-hidden="true">
              <div class="pocket-back"></div>

              <article class="letter" id="letter">
                <div class="letter-content">
                  <h2>Dear Pinki ❤️</h2>
                  <p>Today is your day.

Take a deep breath.

Smile. 😊

Trust yourself.

Aap kr loge.

No matter what happens today,
I'm already proud of you.

Go one step closer to becoming
an amazing UI/UX Designer.

Love,
Ado ❤️</p>
                </div>
              </article>

              <div class="flap"></div>
              <div class="front-left"></div>
              <div class="front-right"></div>
              <div class="front-bottom"></div>
              <div class="seal">♡</div>
            </div>
            <span class="hint">Tap to open</span>
          </button>
        </div>
      </div>

      <button class="last-thing" id="lastThing" type="button">✨ One Last Thing</button>
    </section>

    <section class="final" id="finalScreen" aria-label="All the best message" aria-hidden="true">
      <div class="final-card">
        <h1>❤️ ALL THE BEST ❤️</h1>
        <p>Go and give your best.

Don't think about the result.

Just believe in yourself.

I'm waiting to hear...

&quot;Paper accha gaya.&quot; 😊

— Your Ado ❤️</p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const app = document.getElementById('app');
      const openButton = document.getElementById('openEnvelope');
      const lastThing = document.getElementById('lastThing');
      const finalScreen = document.getElementById('finalScreen');
      const ambient = document.querySelector('.ambient');
      let opened = false;

      // Creates a small, finite sparkle field only after the envelope opens.
      function createSparkles() {
        const fragment = document.createDocumentFragment();
        const sparkleCount = 24;

        for (let index = 0; index < sparkleCount; index += 1) {
          const sparkle = document.createElement('span');
          sparkle.className = 'sparkle';
          sparkle.style.left = `${8 + Math.random() * 84}%`;
          sparkle.style.top = `${18 + Math.random() * 70}%`;
          sparkle.style.setProperty('--x', `${(Math.random() - 0.5) * 54}px`);
          sparkle.style.setProperty('--dur', `${4.2 + Math.random() * 3.4}s`);
          sparkle.style.setProperty('--delay', `${Math.random() * 2.4}s`);
          fragment.appendChild(sparkle);
        }

        ambient.appendChild(fragment);
      }

      function openLetter() {
        if (opened) return;
        opened = true;
        openButton.disabled = true;
        app.classList.add('opened');
        createSparkles();

        // The letter-ready state waits for the physical envelope and paper motion to settle.
        window.setTimeout(() => {
          app.classList.add('letter-ready');
          lastThing.focus({ preventScroll: true });
        }, 2380);
      }

      function showFinalScreen() {
        finalScreen.setAttribute('aria-hidden', 'false');
        app.classList.add('final-active');
        window.requestAnimationFrame(() => {
          finalScreen.classList.add('show');
        });
      }

      openButton.addEventListener('click', openLetter, { passive: true });
      lastThing.addEventListener('click', showFinalScreen, { passive: true });
    })();
  </script>
</body>
</html>
